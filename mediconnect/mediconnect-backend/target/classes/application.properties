# ============================================================
# MediConnect - Application Configuration
# ============================================================

# Server
server.port=8082
server.servlet.context-path=/api

# ============================================================
# Database - PostgreSQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/mediconnect_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway (Database migrations)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ============================================================
# JWT Security
# ============================================================
app.jwt.secret=MediConnect2025SuperSecretKey_ChangeInProduction_AtLeast256Bits
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ============================================================
# Mail
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@mediconnect.com

# ============================================================
# Chatbot (Third-party integration)
# ============================================================
app.chatbot.api-url=${CHATBOT_API_URL:https://api.dialogflow.com}
app.chatbot.api-key=${CHATBOT_API_KEY:your-chatbot-api-key}
app.chatbot.project-id=${CHATBOT_PROJECT_ID:mediconnect-bot}

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000

# ============================================================
# OpenAPI / Swagger
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
